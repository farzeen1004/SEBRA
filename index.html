<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Branding Society</title>
    <meta name="description" content="A new era of branding experiences is coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="cinematic-overlay"></div>
    <div class="noise-overlay"></div>

    <main class="container">
        <div class="content-wrapper">
            <div class="domain reveal-text delay-1">secretbrandingsociety.com</div>

            <div class="brand-logo-stack reveal-text delay-2">
                <div class="logo-stack-text">
                    <span>secret</span>
                    <span>branding</span>
                    <span>soceity.</span>
                </div>
                <div class="logo-stack-icon">
                    <svg viewBox="0 0 60 120" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="butt"
                        stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 6 4 C -2 30, 18 45, 6 60 C -6 75, 14 90, 6 116" />
                        <path d="M 18 4 C 10 30, 30 45, 18 60 C 6 75, 26 90, 18 116" />
                        <path d="M 30 4 C 22 30, 42 45, 30 60 C 18 75, 38 90, 30 116" />
                        <path d="M 42 4 C 34 30, 54 45, 42 60 C 30 75, 50 90, 42 116" />
                        <path d="M 54 4 C 46 30, 66 45, 54 60 C 42 75, 62 90, 54 116" />
                    </svg>
                </div>
                <div class="logo-stack-reg">&reg;</div>
            </div>

            <div class="status-container">
                <p class="coming-soon reveal-text delay-3">COMING SOON</p>
                <p class="development reveal-text delay-4">Currently Under Development</p>
            </div>

            <form class="notify-form fade-up delay-5" id="notify-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter email to be notified" required
                        aria-label="Email Address">
                    <button type="submit" class="notify-btn">Submit</button>
                </div>
            </form>
            <div class="form-message" id="form-message"></div>
        </div>

        <footer class="fade-up delay-6">
            <p class="powered-by">Powered by AHLAQ GROUP LLP</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
